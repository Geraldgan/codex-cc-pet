<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20242e"/>
      <stop offset="1" stop-color="#15171f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="960" height="240" rx="22" fill="url(#fbg)"/>
  <text x="36" y="42" fill="#e8eaed" font-size="20" font-weight="700">它怎么工作</text>

  <!-- 节点 -->
  <g font-size="13">
    <!-- Claude Code -->
    <g transform="translate(36,90)">
      <rect width="170" height="86" rx="14" fill="#2a2f3a" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="85" y="36" fill="#e8eaed" font-size="14" font-weight="600" text-anchor="middle">Claude Code</text>
      <text x="85" y="58" fill="#9aa0aa" text-anchor="middle">+ codex-plugin-cc</text>
      <text x="85" y="74" fill="#9aa0aa" text-anchor="middle">/codex:rescue 派活</text>
    </g>
    <!-- state.json -->
    <g transform="translate(300,90)">
      <rect width="190" height="86" rx="14" fill="#2a2f3a" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="95" y="36" fill="#e8eaed" font-size="14" font-weight="600" text-anchor="middle">Codex 后台 job</text>
      <text x="95" y="58" fill="#9aa0aa" text-anchor="middle">写状态到</text>
      <text x="95" y="74" fill="#9ec5ff" text-anchor="middle">state.json</text>
    </g>
    <!-- pet -->
    <g transform="translate(584,90)">
      <rect width="170" height="86" rx="14" fill="#2a2f3a" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="85" y="38" font-size="26" text-anchor="middle">🐤</text>
      <text x="85" y="64" fill="#e8eaed" font-size="14" font-weight="600" text-anchor="middle">codex-cc-pet</text>
      <text x="85" y="80" fill="#9aa0aa" text-anchor="middle">每 3s 只读轮询</text>
    </g>
    <!-- output -->
    <g transform="translate(820,90)">
      <rect width="104" height="86" rx="14" fill="#23311f" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="52" y="40" fill="#cdeacc" font-size="13" text-anchor="middle">宠物动画</text>
      <text x="52" y="62" fill="#cdeacc" font-size="13" text-anchor="middle">+ 系统通知</text>
    </g>
  </g>

  <!-- 箭头 -->
  <g stroke="#6b7280" stroke-width="2" fill="none">
    <line x1="208" y1="133" x2="296" y2="133" marker-end="url(#arrow)"/>
    <line x1="492" y1="133" x2="580" y2="133" marker-end="url(#arrow)"/>
    <line x1="756" y1="133" x2="816" y2="133" marker-end="url(#arrow)"/>
  </g>
  <g font-size="11" fill="#7c8290" text-anchor="middle">
    <text x="252" y="125">派发</text>
    <text x="536" y="125">读取</text>
  </g>

  <text x="36" y="216" fill="#7c8290" font-size="12">只读 ~/.claude/plugins/data/codex-inline/state · 不连 Claude/Codex,不改任何状态</text>
</svg>
